              <strong>In short</strong><br />
              electronics -> web development -><br /> 
              Agile -> DevOps -> Orchestation -> <br />
              observability -> Logging -> Security
            </div>
          </div>
          
        </div>

        <div class="lower">
          <div class="route"></div>
          <div class="steps">
            <div class="step">
              <div class="node">01</div>
              <div class="label"><strong>Master degree: <br /> Electronic systems</strong><span>Polito</span></div>
            </div>
            <div class="step">
              <div class="node">02</div>
              <div class="label"><strong>Working experience in electronics</strong><span>Design, validation and mass production</span></div>
            </div>
            <div class="step">
              <div class="node">03</div>
              <div class="label"><strong>Full stack web development</strong><span>Nuclio digital school - 6 months</span></div>
            </div>
            <div class="step">
              <div class="node">04</div>
              <div class="label"><strong>Agile methodologies</strong><span>Nuclio</span></div>
            </div>
            <div class="step">
              <div class="node">05</div>
              <div class="label"><strong>Introduction to DevOps and Cloud Infrastructure Technologies</strong><span>4 courses - TLF</span></div>
            </div>
            <div class="step">
              <div class="node">06</div>
              <div class="label"><strong> Advanced Cloud Engineer IT Professional Program (LFS002) </strong><span>6 course - TLF</span></div>
            </div>
            <div class="step">
              <div class="node">07</div>
              <div class="label"><strong>Cyber Security super bundle </strong><span> 6 courses - Ongoing</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
